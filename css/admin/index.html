<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body class="bg-light">

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 bg-dark text-white min-vh-100 p-3">

<h3>EcommerceX</h3>

<hr>

<a href="index.html" class="text-white d-block mb-3">
<i class="fa-solid fa-gauge"></i> Dashboard
</a>

<a href="products.html" class="text-white d-block mb-3">
<i class="fa-solid fa-box"></i> Products
</a>

<a href="orders.html" class="text-white d-block mb-3">
<i class="fa-solid fa-cart-shopping"></i> Orders
</a>

<a href="users.html" class="text-white d-block mb-3">
<i class="fa-solid fa-users"></i> Users
</a>

<a href="settings.html" class="text-white d-block mb-3">
<i class="fa-solid fa-gear"></i> Settings
</a>

</div>

<!-- Main Content -->

<div class="col-md-10 p-4">

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Products</h5>
<h2>120</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Orders</h5>
<h2>86</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">

<h2>250</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center shadow">
<div class="card-body">

<h2>$12,500</h2>
</div>
</div>
</div>

</div>

<div class="card mt-5 shadow">

<div class="card-body">

<h4>Sales Report</h4>

<canvas id="salesChart"></canvas>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/admin.js"></script>
