<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Settings</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/admin.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>


<div class="container-fluid">

<div class="row">


<!-- Sidebar -->

<div class="col-md-2 bg-dark text-white min-vh-100 p-3">

<h3>EcommerceX</h3>

<hr>

<a href="index.html" class="text-white d-block mb-3">
<i class="fa-solid fa-gauge"></i> Dashboard
</a>

<a href="products.html" class="text-white d-block mb-3">
<i class="fa-solid fa-box"></i> Products
</a>

<a href="orders.html" class="text-white d-block mb-3">
<i class="fa-solid fa-cart-shopping"></i> Orders
</a>

<a href="users.html" class="text-white d-block mb-3">
<i class="fa-solid fa-users"></i> Users
</a>

<a href="settings.html" class="text-warning d-block mb-3">
<i class="fa-solid fa-gear"></i> Settings
</a>

</div>



<!-- Main Content -->

<div class="col-md-10 p-4">


<h2>Website Settings</h2>


<div class="card shadow mt-4">

<div class="card-body">


<form>


<div class="mb-3">

<label class="form-label">
Website Name
</label>

<input type="text"
class="form-control"
value="EcommerceX">

</div>



<div class="mb-3">

<label class="form-label">
Admin Email
</label>

<input type="email"
class="form-control"
value="admin@ecommercx.com">

</div>



<div class="mb-3">

<label class="form-label">
Logo Upload
</label>

<input type="file"
class="form-control">

</div>



<div class="mb-3">

<label class="form-label">
Payment Method
</label>


<select class="form-select">

<option>Cash on Delivery</option>

<option>bKash</option>

<option>Nagad</option>

<option>Credit Card</option>

</select>


</div>



<div class="mb-3">

<label class="form-label">
Address
</label>

<textarea class="form-control"
rows="3">

Your Business Address

</textarea>

</div>



<button class="btn btn-success">

Save Settings

</button>


</form>


</div>

</div>


</div>


</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
